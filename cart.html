<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Your Cart - Ellaire</title>
    <link rel="stylesheet" href="main.css" />
  </head>

  <body>
    <div class="header">
        <a href="index.html">
        <h1 class="site-title"> Ellaire</h1>
    </a>

        <div class="container">
        <div class="navbar">

          <div class="logo">
            <a href="index.html">
                <img src="images/logo.png" width="85px" alt="Ellaire logo" />
            </a>
          </div>
          
         <nav>
            <ul id="MenuItems">
              <li><a href="#">Home</a></li>
              <li><a href="products.html">Products</a></li>
              <li><a href="#">About</a></li>
              <li><a href="#">Contact</a></li>
              <li><a href="#">Account</a></li>
            </ul>
          </nav>
          
    <a href="cart.html">
        <img src="images/cart.png" class="cart-icon" alt="Shopping Cart" />
    </a>
</div>
</div>
    <div class="small-container">
      <h2 class="title">Shopping Cart</h2>

      <div id="cart-items"></div>

      <h3 id="cart-total">Total</h3>
    </div>

    <script>
      function loadCart() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let cartItemsContainer = document.getElementById("cart-items");
        let total = 0;

        cartItemsContainer.innerHTML = "";

        if (cart.length === 0) {
          cartItemsContainer.innerHTML = "<p>Your Cart is Empty.</p>";
          document.getElementById("cart-total").innerHTML = "";
          return;
        }

        cart.forEach((item, index) => {
          total += item.price * item.quantity;

          cartItemsContainer.innerHTML += `
                <div class="cart-item" style="margin-bottom: 20px; auto; display: flex; align-items: center; gap: 20px;">
                    <img src= "images/woodchairx.png" style="width:100px; height:100px; object-fit:cover;">
                    <div>
                    <h4>${item.name}</h4>
                    <p>Price: $${item.price}</p>
                    <p>Quantity: ${item.quantity}</p>
                    <p>Subtotal: $${item.price * item.quantity}</p>
                    <button onclick="removeFromCart(${index})">Remove</button>
                    </div>
                </div>
                <hr>
                `;
        });

        document.getElementById("cart-total").innerHTML = `Total: $${total}`;
      }

      function removeFromCart(index) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        loadCart();
      }

      loadCart();
    </script>
  </body>
</html>
